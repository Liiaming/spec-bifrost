name: Feature request
description: Suggest a focused improvement for Spec Bifrost.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or user need is blocked today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Spec Bifrost do?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope fit
      description: Explain why this stays within the plugin's requirement-prototype boundary.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
