name: Bug report
description: Report a reproducible problem in Spec Bifrost.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove sensitive business data before sharing snippets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, files, or UI steps.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node.js, npm, Claude Code CLI, OS, and Spec Bifrost version or commit.
      placeholder: |
        Node.js:
        npm:
        Claude Code CLI:
        OS:
        Commit:
    validations:
      required: false
  - type: textarea
    id: spec
    attributes:
      label: Sanitized spec snippet
      description: Optional. Include only the relevant `spec-bifrost.json` snippet with sensitive data removed.
      render: json
    validations:
      required: false
